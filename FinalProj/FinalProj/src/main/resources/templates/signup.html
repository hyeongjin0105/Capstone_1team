<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StudyStream - 회원가입</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo-wrap">
        <div class="logo-icon">▶</div>
        <h1 class="auth-title">StudyStream</h1>
    </div>
    <p class="auth-sub">학습자료 스트리밍 서비스 회원가입</p>

    <form action="/signup" method="post">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="user@example.com" required>
        </div>

        <div class="form-group">
            <label>사용자 이름</label>
            <input type="text" name="username" placeholder="이름 또는 닉네임" required>
        </div>

        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호" required>
        </div>

        <button class="btn btn-green full-btn" type="submit">회원가입</button>
    </form>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <div class="auth-link">
        이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
</div>

</body>
</html>
