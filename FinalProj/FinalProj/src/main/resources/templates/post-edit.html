<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StudyStream - 게시글 수정</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a class="logo-wrap logo-link" href="/posts">
            <div class="logo-icon">▶</div>
            <div class="logo-text-group">
                <h1 class="logo">StudyStream</h1>
                <p class="logo-sub">Learn • Share • Stream</p>
            </div>
        </a>

        <nav class="nav">
            <div class="nav-left">
                <a href="/posts">게시글 목록</a>
                <a href="/posts/write">자료 업로드</a>
            </div>

            <div class="nav-right">
                <span th:if="${username != null}">
                    <strong th:text="${username}"></strong>님 환영합니다.
                    <a href="/logout">로그아웃</a>
                </span>

                <span th:if="${username == null}">
                    <a href="/login">로그인</a>
                    <a href="/signup">회원가입</a>
                </span>
            </div>
        </nav>
    </div>
</header>

<main class="main">
    <section class="card form-card">
        <div class="card-heading">
            <div>
                <h2 class="card-title">게시글 수정</h2>
                <p class="page-desc">게시글 내용과 첨부된 학습자료 파일을 수정합니다.</p>
            </div>
            <span class="hero-badge">Edit</span>
        </div>

        <div class="error-message" th:if="${errorMessage != null}" th:text="${errorMessage}">
            파일 업로드 오류 메시지
        </div>

        <form th:action="@{/posts/{id}/edit(id=${post.postId})}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>제목</label>
                <input type="text" name="title" th:value="${post.title}" required>
            </div>

            <div class="form-group">
                <label>카테고리</label>
                <select name="category" required>
                    <option value="강의녹음" th:selected="${post.category == '강의녹음'}">강의녹음</option>
                    <option value="실습영상" th:selected="${post.category == '실습영상'}">실습영상</option>
                    <option value="발표영상" th:selected="${post.category == '발표영상'}">발표영상</option>
                    <option value="학습자료" th:selected="${post.category == '학습자료'}">학습자료</option>
                </select>
            </div>

            <div class="form-group">
                <label>내용</label>
                <textarea name="content" th:text="${post.content}" required></textarea>
            </div>

            <div class="form-group">
                <label>현재 첨부 파일</label>

                <div th:if="${mediaList == null or mediaList.size() == 0}" class="empty-message edit-empty-message">
                    현재 첨부된 파일이 없습니다.
                </div>

                <div class="attached-file-list" th:if="${mediaList != null and mediaList.size() > 0}">
                    <label th:each="media : ${mediaList}" class="attached-file-item">
                        <input type="checkbox" name="deleteMediaIds" th:value="${media.mediaId}">
                        <span>
                            <strong th:text="${media.fileName}">파일명</strong>
                            <em>삭제하기</em>
                        </span>
                    </label>
                </div>

                <p class="form-note">삭제할 파일만 체크하면 수정 완료 시 해당 파일이 삭제됩니다.</p>
            </div>

            <div class="form-group">
                <label>새 파일 추가</label>
                <div class="upload-box">
                    <input type="file" name="mediaFiles" multiple accept="audio/*,video/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.md,.html,.htm">
                    <p class="form-note">새 파일을 선택하면 기존 파일은 유지되고 선택한 파일이 추가됩니다.</p>
                </div>
            </div>

            <div class="btn-area">
                <button class="btn btn-primary" type="submit">수정 완료</button>
                <a class="btn btn-gray" th:href="@{/posts/{id}(id=${post.postId})}">취소</a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
