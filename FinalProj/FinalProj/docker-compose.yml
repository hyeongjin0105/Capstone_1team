services:
  mysql:
    image: mysql:8.0
    container_name: studystream-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: hjsb38903230*
      MYSQL_DATABASE: studystream_db
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  app:
    build: .
    container_name: studystream-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/studystream_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: hjsb38903230*
